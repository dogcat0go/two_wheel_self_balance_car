balance_controller_node:
  ros__parameters:
    use_sim_time: true
    enabled: true

    imu_topic: /imu/data
    joint_states_topic: /joint_states
    # effort 模式：单位是 N·m，写到 wheel_effort_controller 的指令话题
    command_topic: /wheel_effort_controller/commands
    debug_topic: /balance_controller/debug
    control_rate: 200.0
    log_period_sec: 0.05

    pitch_target: 0.0
    kp_pitch: 1.2
    kd_pitch: 0.08
    kv_wheel: 0.02
    pitch_deadband: 0.003
    min_balance_effort: 0.0
    output_sign: 1.0

    # 单轮力矩饱和与变化率上限。max_wheel_effort 必须 <= URDF 的 wheel_effort_limit (2.5 N·m)
    max_wheel_effort: 2.5
    max_effort_slew: 60.0
    fall_angle_rad: 0.9
    imu_timeout_sec: 0.2