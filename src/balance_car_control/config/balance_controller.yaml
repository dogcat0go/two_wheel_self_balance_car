balance_controller_node:
  ros__parameters:
    use_sim_time: true
    enabled: true

    imu_topic: /imu/data
    joint_states_topic: /joint_states
    # effort 模式：单位是 N·m，写到 wheel_effort_controller 的指令话题
    command_topic: /wheel_effort_controller/commands
    debug_topic: /balance_controller/debug
    control_rate: 200.0
    # 调高到 0.5：每 0.5 秒一条 INFO 就够看了，原来 0.005 等于每拍都打日志，开销大且刷屏。
    # 详细数据交给 PlotJuggler/rosbag，不靠 stdout。
    log_period_sec: 0.05

    # 串级开启后，pitch_target 只当"额外偏置"，一般留 0：
    # 让外环速度环的积分自动累积到抵消质心/IMU 零偏的那个角度。
    pitch_target: -0.011
    # 内环=角度 PD（kp/kd）。串级下 kv_wheel 必须为 0：
    # 轮速由外环负责，内环再插一手 kv 会和外环打架。
    kp_pitch: 1.0
    kd_pitch: 0.05
    kv_wheel: 0.0
    kx_position: 0.05   # 位置环新增,从这里起
    pitch_deadband: 0.0
    min_balance_effort: 0.0
    output_sign: 1.0

    # 单轮力矩饱和与变化率上限。
    #   max_wheel_effort 关键约束：必须 ≤ 地面摩擦的 slip 阈值
    #     = μ × m_total × g / 2 × r = 1.0 × 0.756 × 9.81 / 2 × 0.0325 ≈ 0.12 N·m
    #   超过这个值轮子会原地打滑，控制力矩传不到车体，PD 闭环数学失效。
    max_wheel_effort: 0.24
    max_effort_slew: 500.0
    fall_angle_rad: 0.9
    imu_timeout_sec: 0.05

    # 轮速一阶低通：joint_states 原始轮速抖动较大，kv 反馈会放大它。
    # 0.3 表示每帧只采纳 30% 新值，明显平滑；嫌滞后可调到 0.5，要更稳可降到 0.2。
    # 设 1.0 等于关闭滤波（回到原始行为）。
    wheel_velocity_lpf_alpha: 0.5

    # ===== 串级外环：速度环（输出 pitch_target 给内环）=====
    # 调参顺序：先把内环(kp_pitch/kd_pitch)单独调到能短暂站立，
    # 再开外环、从小往大加 kp_v、ki_v。
    velocity_loop_enabled: true
    # kp_v：轮速误差 -> 目标倾角的比例。先小，0.003~0.008 起步。
    kp_v: 0.017
    # ki_v：积分，消除稳态漂移 + 自动找平质心零偏。太大易低频晃动。
    ki_v: 0.00075
    # 期望轮速：站立平衡=0；以后做"前进/后退"在这里给非零(rad/s)。
    target_velocity: 0.0
    # 外环能要求的最大倾角(rad)，保护内环不被拉爆。0.12rad≈6.9°。
    pitch_target_limit: 0.12
    # 积分项 anti-windup 限幅(rad)，与 pitch_target 同单位。
    velocity_integral_limit: 0.12
    # 符号开关：若开外环后"漂移反而被加速"，把它改成 -1.0 翻转。
    velocity_output_sign: -1.0

    # ===== 串级最外环：位置环（输出速度设定给速度环）=====
    # 作用：消除“停车倒退”。x_target 积分被命令速度，停车(v=0)时冻结，
    # 把刹车时倒退的那点行程再补回来；行驶时 x_target 随指令移动，不打架。
    # 调参顺序：速度环调稳后再开；kp_x 从小往大加。
    position_loop_enabled: true
    # kp_x：位置误差(rad) → 速度修正(rad/s)。先 0.3~0.6，过大停车点附近来回蹭。
    kp_x: 0.4
    # kd_x：位置误差变化率阻尼，一般留 0，阻尼交给速度环。
    kd_x: 0.0
    # 位置环最多能要求的速度修正(rad/s)，保护速度环不被拉爆。
    max_velocity_correction: 3.0
    # 位置误差 anti-windup 限幅(rad)，限制“记多远”。20rad ≈ 0.65m 行程。
    max_position_error: 20.0
    # 符号开关：若开位置环后“越跑越远/发散”，改成 -1.0。
    position_output_sign: 1.0

    # ===== 运动指令：/cmd_vel → 速度 + 方向（框架）=====
    cmd_vel_topic: /cmd_vel
    motion_control_enabled: true
    wheel_radius: 0.0325          # [m] 与 URDF 一致，用于 linear.x → 轮速 rad/s
    max_linear_velocity: 0.5      # [m/s] 前进/后退限速
    max_angular_velocity: 1.5     # [rad/s] 原地/行进转向限速
    max_wheel_velocity_cmd: 15.0  # [rad/s] 换算后轮速硬限幅
    cmd_vel_timeout_sec: 0.5      # [s] 无新 cmd_vel 则目标归零（站立）

    # ===== 偏航环：target_yaw_rate → turn_tau（差动力矩）=====
    # 站立平衡时不要输出 turn_tau：|target_yaw_rate| 须超过 activate 阈值才启用。
    # 否则 IMU 陀螺 z 轴零偏会被当成“要转向”，左右力矩不对称 → 前冲/摔倒。
    yaw_loop_enabled: true
    kp_yaw: 0.07                  # [N·m/(rad/s)] 先小后大
    kd_yaw: 0.0
    max_turn_tau: 0.06            # [N·m] 差动力矩上限，应明显 < max_wheel_effort
    yaw_output_sign: 1.0          # 转向反了改 ±1
    # |cmd_vel.angular.z| < 此值时不施加 turn_tau（站立 = 0）
    yaw_cmd_activate_threshold: 0.05
    yaw_rate_deadband: 0.02       # IMU yaw_rate 噪声/零偏死区